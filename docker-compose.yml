version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://shikaku:shikaku@db:5432/shikaku
      JWT_SECRET: local-dev-secret-change-in-production
      PORT: "8080"
      COOKIE_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shikaku
      POSTGRES_PASSWORD: shikaku
      POSTGRES_DB: shikaku
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shikaku"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
